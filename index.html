<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Finance — рассрочка</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Finance</h1>
        <p class="subtitle">Калькулятор рассрочки</p>
      </header>

      <main class="main">
        <form class="card form" id="calc-form" novalidate>
          <div class="field">
            <label class="label" for="price">Стоимость товара, ₽</label>
            <input
              class="input"
              type="number"
              id="price"
              name="price"
              inputmode="decimal"
              min="1"
              step="1"
              placeholder="Например, 45000"
              required
            />
          </div>

          <div class="field field--down" id="down-block">
            <label class="label" for="down">Первый взнос, ₽</label>
            <input
              class="input"
              type="number"
              id="down"
              name="down"
              inputmode="numeric"
              min="0"
              step="50"
            />
            <p class="hint" id="down-hint"></p>
          </div>

          <div class="field">
            <label class="label" for="months">Срок, месяцев</label>
            <select
              class="input input--select"
              id="months"
              name="months"
            ></select>
          </div>
        </form>

        <section class="card results" id="results" aria-live="polite">
          <h2 class="results__title">Расчёт</h2>
          <ul class="results__list">
            <li class="results__row results__row--down" id="row-down">
              <span class="results__label">Первый взнос</span>
              <span class="results__value" id="out-down">—</span>
            </li>
            <li class="results__row">
              <span class="results__label">Наценка</span>
              <span class="results__value" id="out-markup">—</span>
            </li>
            <li class="results__row results__row--total">
              <span class="results__label">Итого к оплате</span>
              <span class="results__value" id="out-total">—</span>
            </li>
            <li class="results__row results__row--accent">
              <span class="results__label">Ежемесячный платёж</span>
              <span class="results__value" id="out-monthly">—</span>
            </li>
          </ul>
        </section>

        <a
          class="wa-btn"
          id="wa-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="wa-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
            />
          </svg>
          Оформить заявку
        </a>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
